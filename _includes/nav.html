{%- comment -%}
  Primary navigation. Kept to three destinations + a theme toggle, per the brief
  ("Home · Writing · About"). The current page is marked with aria-current.
{%- endcomment -%}
{%- assign p = page.url -%}
<header class="site-header">
  <nav class="nav" aria-label="Primary">
    <a class="nav__brand" href="{{ '/' | relative_url }}">{{ site.author.name }}</a>

    <ul class="nav__links">
      <li>
        <a href="{{ '/' | relative_url }}"{% if p == '/' %} aria-current="page"{% endif %}>Home</a>
      </li>
      <li>
        <a href="{{ '/writing/' | relative_url }}"{% if p contains '/writing' %} aria-current="page"{% endif %}>Writing</a>
      </li>
    </ul>

    <button id="theme-toggle" class="theme-toggle" type="button"
            aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg class="icon icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </nav>
</header>
